services:
  fastnetpay_db:
    image: mysql:8.0
    container_name: fastnetpay_db
    restart: unless-stopped
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-fast_pay_net}
      MYSQL_USER: ${DB_USER:-fastnetpay_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      TZ: ${TZ:-Africa/Nairobi}
    volumes:
      - fastnetpay_db_data:/var/lib/mysql
      - ./install/phpnuxbill.sql:/docker-entrypoint-initdb.d/01-phpnuxbill.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} || mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fastnetpay_internal

  fastnetpay_app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: fastnetpay_app:prod
    container_name: fastnetpay_app
    restart: unless-stopped
    env_file:
      - ${FASTNETPAY_ENV_FILE:-.env.production}
    environment:
      APP_STAGE: Live
      APP_DISPLAY_ERRORS: "0"
      DB_HOST: fastnetpay_db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-fast_pay_net}
      DB_USER: ${DB_USER:-fastnetpay_app}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      TZ: ${TZ:-Africa/Nairobi}
    volumes:
      - ./system/uploads:/var/www/html/system/uploads
      - fastnetpay_system_cache:/var/www/html/system/cache
      - fastnetpay_ui_cache:/var/www/html/ui/cache
      - fastnetpay_ui_compiled:/var/www/html/ui/compiled
      - fastnetpay_qrcode_cache:/var/www/html/qrcode/cache
      - fastnetpay_mpdf_tmp:/var/www/html/system/vendor/mpdf/mpdf/tmp
    depends_on:
      fastnetpay_db:
        condition: service_healthy
    expose:
      - "80"
    security_opt:
      - no-new-privileges:true
    networks:
      - fastnetpay_internal

  fastnetpay_scheduler:
    image: fastnetpay_app:prod
    container_name: fastnetpay_scheduler
    restart: unless-stopped
    env_file:
      - ${FASTNETPAY_ENV_FILE:-.env.production}
    environment:
      APP_STAGE: Live
      APP_DISPLAY_ERRORS: "0"
      DB_HOST: fastnetpay_db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-fast_pay_net}
      DB_USER: ${DB_USER:-fastnetpay_app}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      TZ: ${TZ:-Africa/Nairobi}
    command: ["bash", "-lc", "mkdir -p /var/log/fastnetpay && while true; do cd /var/www/html/system && php cron.php >> /var/log/fastnetpay/cron.log 2>&1; sleep ${FASTNETPAY_CRON_INTERVAL:-60}; done"]
    volumes:
      - ./system/uploads:/var/www/html/system/uploads
      - fastnetpay_system_cache:/var/www/html/system/cache
      - fastnetpay_ui_cache:/var/www/html/ui/cache
      - fastnetpay_ui_compiled:/var/www/html/ui/compiled
      - fastnetpay_qrcode_cache:/var/www/html/qrcode/cache
      - fastnetpay_mpdf_tmp:/var/www/html/system/vendor/mpdf/mpdf/tmp
      - fastnetpay_cron_logs:/var/log/fastnetpay
    depends_on:
      fastnetpay_db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - fastnetpay_internal

  fastnetpay_nginx:
    image: nginx:1.27-alpine
    container_name: fastnetpay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.docker/nginx/fastnetpay.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.docker/nginx/root:/usr/share/nginx/fastnetpay-root:ro
      - ./.docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - fastnetpay_app
    security_opt:
      - no-new-privileges:true
    networks:
      - fastnetpay_internal
      - fastnetpay_public

volumes:
  fastnetpay_db_data:
    name: fastnetpay_prod_db_data
  fastnetpay_system_cache:
  fastnetpay_ui_cache:
  fastnetpay_ui_compiled:
  fastnetpay_qrcode_cache:
  fastnetpay_mpdf_tmp:
  fastnetpay_cron_logs:

networks:
  fastnetpay_internal:
    driver: bridge
  fastnetpay_public:
