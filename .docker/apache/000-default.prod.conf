<VirtualHost *:80>
    ServerName fastnetpay.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    <FilesMatch "^(\.env|config\.php|config\.sample\.php|composer\.(json|lock)|docker-compose.*\.yml|Dockerfile.*)$">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "^/var/www/html/(\.git|\.docker|install|test-results|vendor|node_modules|\.claude)">
        Require all denied
    </DirectoryMatch>

    <Directory "/var/www/html/system/uploads">
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Robots-Tag "noindex, nofollow, noarchive, nosnippet, noai, noimageai"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()"

    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy 172.16.0.0/12
    RemoteIPTrustedProxy 10.0.0.0/8
    RemoteIPTrustedProxy 192.168.0.0/16

    ErrorLog ${APACHE_LOG_DIR}/fastnetpay-error.log
    CustomLog ${APACHE_LOG_DIR}/fastnetpay-access.log combined
</VirtualHost>
