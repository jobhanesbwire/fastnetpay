<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You are lost - FASTNETPAY</title>
  <meta name="robots" content="noindex,nofollow,noarchive">
  <style>
    :root {
      --fnp-primary: #41a146;
      --fnp-secondary: #f9c02b;
      --fnp-bg: #f1f1f1;
      --fnp-dark: #172033;
      --fnp-muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--fnp-dark);
      background:
        radial-gradient(circle at top left, rgba(65, 161, 70, .18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(249, 192, 43, .20), transparent 30%),
        var(--fnp-bg);
    }
    main {
      width: min(100%, 560px);
      padding: 34px;
      border-radius: 22px;
      background: #fff;
      text-align: center;
      border: 1px solid rgba(65, 161, 70, .14);
      box-shadow: 0 24px 70px rgba(15, 23, 42, .14);
    }
    .mark {
      width: 68px;
      height: 68px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(135deg, var(--fnp-primary), #2f7f35);
      box-shadow: 0 14px 32px rgba(65, 161, 70, .24);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: 0;
    }
    p {
      max-width: 430px;
      margin: 0 auto;
      color: var(--fnp-muted);
      line-height: 1.6;
    }
    .pill {
      display: inline-flex;
      margin-top: 20px;
      padding: 8px 13px;
      border-radius: 999px;
      color: #735400;
      background: rgba(249, 192, 43, .2);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">FNP</div>
    <h1>You are lost</h1>
    <p>This address is reserved for FASTNETPAY infrastructure. Use the ISP portal link provided by your operator.</p>
    <div class="pill">FASTNETPAY secure ISP billing</div>
  </main>
</body>
</html>
