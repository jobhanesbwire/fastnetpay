limit_req_zone $binary_remote_addr zone=fnp_global:20m rate=12r/s;
limit_conn_zone $binary_remote_addr zone=fnp_conn:20m;

map $http_x_forwarded_proto $fnp_forwarded_proto {
    default $scheme;
    ~^(https|http)$ $http_x_forwarded_proto;
}

upstream fastnetpay_app_upstream {
    server fastnetpay_app:80;
    keepalive 32;
}

server_tokens off;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:FNPSSL:10m;
ssl_session_timeout 1d;
ssl_certificate /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name fastnetpay.co.ke www.fastnetpay.co.ke _;
    root /usr/share/nginx/fastnetpay-root;
    index index.html;

    client_max_body_size 64m;
    limit_conn fnp_conn 40;
    limit_req zone=fnp_global burst=80 nodelay;

    if ($http_user_agent ~* "(GPTBot|ChatGPT-User|OAI-SearchBot|ClaudeBot|Claude-Web|anthropic-ai|PerplexityBot|Bytespider|CCBot|Google-Extended|Applebot-Extended|Amazonbot|FacebookBot|Meta-ExternalAgent|Diffbot|YouBot|cohere-ai)") {
        return 403;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location ~* /(\.git|\.env|\.docker|\.claude|composer\.(json|lock)|docker-compose.*\.yml|Dockerfile|config\.php|config\.sample\.php) {
        return 403;
    }

    location ~* ^/(install|test-results)/ {
        return 403;
    }

    location / {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name api.fastnetpay.co.ke vpn.fastnetpay.co.ke portainer.fastnetpay.co.ke admin.fastnetpay.co.ke mail.fastnetpay.co.ke smtp.fastnetpay.co.ke ftp.fastnetpay.co.ke docs.fastnetpay.co.ke support.fastnetpay.co.ke status.fastnetpay.co.ke monitor.fastnetpay.co.ke callback.fastnetpay.co.ke assets.fastnetpay.co.ke static.fastnetpay.co.ke;
    root /usr/share/nginx/fastnetpay-root;
    index index.html;

    client_max_body_size 64m;
    limit_conn fnp_conn 20;
    limit_req zone=fnp_global burst=40 nodelay;

    if ($http_user_agent ~* "(GPTBot|ChatGPT-User|OAI-SearchBot|ClaudeBot|Claude-Web|anthropic-ai|PerplexityBot|Bytespider|CCBot|Google-Extended|Applebot-Extended|Amazonbot|FacebookBot|Meta-ExternalAgent|Diffbot|YouBot|cohere-ai)") {
        return 403;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location / {
        try_files /index.html =404;
    }
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name mother.fastnetpay.co.ke *.fastnetpay.co.ke;

    client_max_body_size 64m;
    limit_conn fnp_conn 40;
    limit_req zone=fnp_global burst=80 nodelay;

    if ($http_user_agent ~* "(GPTBot|ChatGPT-User|OAI-SearchBot|ClaudeBot|Claude-Web|anthropic-ai|PerplexityBot|Bytespider|CCBot|Google-Extended|Applebot-Extended|Amazonbot|FacebookBot|Meta-ExternalAgent|Diffbot|YouBot|cohere-ai)") {
        return 403;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location ~* /(\.git|\.env|\.docker|\.claude|composer\.(json|lock)|docker-compose.*\.yml|Dockerfile|config\.php|config\.sample\.php) {
        return 403;
    }

    location ~* ^/(install|test-results)/ {
        return 403;
    }

    location / {
        proxy_pass http://fastnetpay_app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fnp_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
