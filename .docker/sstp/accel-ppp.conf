[modules]
log_file
sstp
auth_mschap_v2
ippool
chap-secrets
pppd_compat

[core]
log-error=/var/log/accel-ppp/core.log
thread-count=4

[common]
single-session=replace
max-sessions=500

[ppp]
verbose=1
min-mtu=1280
mtu=1400
mru=1400
ipv4=require
ipv6=deny
mppe=require

[lcp]
echo-interval=30
echo-failure=3

[sstp]
bind=0.0.0.0
port={{SSTP_PORT}}
verbose=1
timeout=60
hello-interval=30
accept=ssl
ssl-pemfile={{SSTP_CERT_FILE}}
ssl-keyfile={{SSTP_KEY_FILE}}
host-name={{SSTP_HOST}}
http-error=deny

[client-ip-range]
0.0.0.0/0

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

[ip-pool]
gw-ip-address={{SSTP_LOCAL_IP}}
{{SSTP_POOL}}

[chap-secrets]
gw-ip-address={{SSTP_LOCAL_IP}}
chap-secrets=/etc/ppp/chap-secrets

[pppd-compat]
verbose=1

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
log-emerg=/var/log/accel-ppp/emerg.log
log-fail-file=/var/log/accel-ppp/auth-fail.log
copy=1
level=3
