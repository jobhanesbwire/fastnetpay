<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FASTNETPAY Session Status</title>
    <link rel="stylesheet" href="assets/css/fastnetpay-hotspot.css">
</head>
<body>
    <main class="page">
        <section class="portal">
            <div class="hero">
                <div class="brand"><span class="wifi-mark">)))</span><strong>FASTNETPAY</strong></div>
                <h1>Session status</h1>
                <p>Review your active hotspot connection.</p>
            </div>
            <div class="body">
                <p class="notice">User: $(username)<br>IP: $(ip)<br>Uptime: $(uptime)<br>Remaining: $(session-time-left)</p>
                <a class="btn btn-primary" href="$(link-logout)">Logout</a>
                <a class="btn btn-secondary" href="https://fastnetpay.example.com/index.php?_route=order/package">Buy another package</a>
            </div>
        </section>
    </main>
</body>
</html>
